const GROUP_ORDER = ['회원/인증','시험/문제','접수/결과','AI윤리 전용','결제/포인트','마케팅','운영/콘텐츠','전문가','B2B','분류/통계'];
const GROUP_ICON = {'회원/인증':'👤','시험/문제':'📝','접수/결과':'🎯','AI윤리 전용':'🔬','결제/포인트':'💳','마케팅':'📈','운영/콘텐츠':'📢','전문가':'🎓','B2B':'🏢','분류/통계':'🗂'};

let currentTable = 'users';
let currentView = 'data';
let dirty = false;

/* ── 사이드바 테이블 목록 ── */
function renderTableList(){
  const kw = (document.getElementById('tblSearch').value||'').trim().toLowerCase();
  const list = document.getElementById('tableList');
  let html = '';
  let builtN = 0, designedN = 0, shown = 0;
  for (const g of GROUP_ORDER){
    const entries = Object.entries(SCHEMA).filter(([name,t]) => t.group===g &&
      (!kw || name.includes(kw) || t.kor.toLowerCase().includes(kw)));
    if (entries.length===0) continue;
    html += `<div class="px-4 py-1.5 text-[9px] text-gray-500 uppercase tracking-widest mt-2">${GROUP_ICON[g]} ${g}</div>`;
    for (const [name,t] of entries){
      shown++;
      const active = name===currentTable ? 'tbl-active' : 'hover:bg-gray-700';
      const badge = t.status==='built'
        ? `<span class="badge-built text-[8px] font-bold px-1.5 py-0.5 rounded bg-green-500/20 text-green-400">구축</span>`
        : `<span class="text-[8px] px-1.5 py-0.5 rounded bg-gray-700 text-gray-400">설계</span>`;
      html += `<a onclick="selectTable('${name}')" class="flex items-center justify-between gap-1.5 px-4 py-1.5 cursor-pointer ${active}">
        <span class="truncate"><span class="opacity-60 text-[10px]">${t.kor}</span> <code class="text-[10px] opacity-90">${name}</code></span>${badge}</a>`;
    }
  }
  for (const t of Object.values(SCHEMA)){ t.status==='built'?builtN++:designedN++; }
  list.innerHTML = html || `<div class="px-4 py-6 text-center text-gray-500 text-[11px]">검색 결과 없음</div>`;
  document.getElementById('tblCount').textContent = `${Object.keys(SCHEMA).length}개 테이블`;
  document.getElementById('builtCount').textContent = builtN;
  document.getElementById('designedCount').textContent = designedN;
}

function selectTable(name){ currentTable = name; dirty=false; updateDirty(); renderTableList(); renderAll(); }

function switchView(v){
  currentView = v;
  ['data','schema','sql'].forEach(x=>{
    document.getElementById('section-'+x).classList.toggle('hidden', x!==v);
    const btn = document.getElementById('view-'+x);
    btn.className = `text-[11px] font-bold px-3 py-1.5 rounded-lg ${x===v?'bg-green-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
  });
  renderAll();
}

function renderAll(){
  const t = SCHEMA[currentTable];
  document.getElementById('curTblKor').textContent = t.kor;
  document.getElementById('curTblName').textContent = currentTable;
  const st = document.getElementById('curTblStatus');
  st.textContent = t.status==='built' ? '구축됨' : '설계만 완료';
  st.className = t.status==='built'
    ? 'text-[9px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 border border-green-200'
    : 'text-[9px] font-bold px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 border border-gray-200';
  const fkN = t.cols.filter(col=>String(col.key).includes('FK')).length;
  document.getElementById('metaCols').textContent = t.cols.length;
  document.getElementById('metaRows').textContent = t.status==='built'
    ? (currentTable==='users'?'12,847':currentTable==='exam_applications'?'1,243':'247')
    : '0';
  document.getElementById('metaFk').textContent = fkN;
  document.getElementById('metaGroup').textContent = `📂 ${t.group}`;
  document.getElementById('metaDesc').textContent = t.desc;
  if (currentView==='data') renderGrid();
  if (currentView==='schema') renderSchema();
  if (currentView==='sql') renderSql();
}

/* ── 데이터 그리드 ── */
function renderGrid(){
  const t = SCHEMA[currentTable];
  const head = document.getElementById('gridHead');
  const body = document.getElementById('gridBody');
  const empty = document.getElementById('emptyData');
  if (!t.rows || t.rows.length===0){
    head.innerHTML=''; body.innerHTML='';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  const keys = Object.keys(t.rows[0]);
  head.innerHTML = '<tr>'+keys.map(k=>`<th class="px-3 py-2.5">${k}</th>`).join('')+'<th class="px-3 py-2.5"></th></tr>';
  const kw = (document.getElementById('rowSearch').value||'').trim().toLowerCase();
  const rows = kw ? t.rows.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(kw))) : t.rows;
  body.innerHTML = rows.map((r,i)=>'<tr class="hover:bg-gray-50">'+keys.map(k=>{
    const isPk = k==='id';
    return `<td class="px-3 py-2 ${isPk?'text-gray-400 font-mono':''}">
      <span class="cell-edit ${isPk?'':'cursor-text'}" ${isPk?'':'contenteditable oninput="markDirty()"'}>${r[k]}</span></td>`;
  }).join('')+`<td class="px-3 py-2 text-right"><button onclick="this.closest('tr').remove();markDirty()" class="text-gray-300 hover:text-red-500 text-[11px]">🗑</button></td></tr>`).join('');
}

function addRow(){
  const t = SCHEMA[currentTable];
  if (!t.rows || t.rows.length===0){ alert('설계만 완료된 테이블입니다. 먼저 SQL로 생성하세요.'); return; }
  const blank = {}; Object.keys(t.rows[0]).forEach(k=>blank[k]= k==='id'?'(new)':'');
  t.rows.unshift(blank); markDirty(); renderGrid();
  document.querySelector('#gridBody tr')?.classList.add('row-new');
}
function markDirty(){ dirty=true; updateDirty(); }
function updateDirty(){ document.getElementById('dirtyBadge').classList.toggle('hidden', !dirty); }
function saveAll(){ dirty=false; updateDirty(); alert('변경사항 저장 (목업) — 실제로는 PATCH /api/admin/db/'+currentTable); }

/* ── 스키마 뷰 ── */
function renderSchema(){
  const t = SCHEMA[currentTable];
  document.getElementById('schemaBody').innerHTML = t.cols.map(col=>{
    const isPk = String(col.key).includes('PK');
    const isFk = String(col.key).includes('FK');
    const keyBadge = col.key ? `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded ${isPk?'bg-amber-100 text-amber-700':isFk?'bg-blue-100 text-blue-700':'bg-gray-100 text-gray-500'}">${col.key}</span>` : '';
    return `<tr class="hover:bg-gray-50">
      <td class="px-4 py-2 font-bold text-gray-800">${isPk?'🔑 ':''}${col.name}</td>
      <td class="px-4 py-2"><code class="text-[10px] text-purple-700 bg-purple-50 px-1.5 py-0.5 rounded">${col.type}</code></td>
      <td class="px-4 py-2">${keyBadge}</td>
      <td class="px-4 py-2 text-gray-500">${col.desc||'—'}</td></tr>`;
  }).join('');
  const fks = t.cols.filter(col=>String(col.key).includes('FK'));
  document.getElementById('fkBox').innerHTML = fks.length ? `
    <div class="bg-blue-50 border border-blue-100 rounded-xl p-4">
      <div class="text-[11px] font-black text-blue-800 mb-2">🔗 외래키(FK) 관계 ${fks.length}건</div>
      <div class="flex flex-wrap gap-2">${fks.map(col=>{
        const target = String(col.key).replace('FK','').replace('→','').replace('UNIQUE','').replace('CASCADE','').replace('SET NULL','').trim();
        return `<span class="text-[10px] bg-white border border-blue-200 rounded-lg px-2.5 py-1"><code>${col.name}</code> <span class="text-blue-400">→</span> <code class="text-blue-700">${target||'?'}</code></span>`;
      }).join('')}</div></div>` : '';
}

/* ── SQL 뷰 ── */
function typeToSql(t){ return t.replace('UUID','UUID').replace('TIMESTAMPTZ','TIMESTAMP WITH TIME ZONE'); }
function renderSql(){
  const t = SCHEMA[currentTable];
  let sql = `CREATE TABLE IF NOT EXISTS ${currentTable} (\n`;
  sql += t.cols.map(col=>{
    let line = `  ${col.name.padEnd(24)} ${typeToSql(col.type)}`;
    if (String(col.key).includes('PK')) line += ' PRIMARY KEY';
    if (String(col.key).includes('UNIQUE')) line += ' UNIQUE';
    if (String(col.key).includes('NOT NULL')) line += ' NOT NULL';
    return line;
  }).join(',\n');
  sql += '\n);';
  if (t.status==='built') sql = `-- ✅ 이 테이블은 schema.sql 에 실제 존재합니다.\n` + sql;
  else sql = `-- ⚙ 설계 단계 — 아래 SQL을 Supabase SQL Editor에 실행하면 생성됩니다.\n` + sql;
  document.getElementById('sqlBox').textContent = sql;
}
function copySql(){ navigator.clipboard?.writeText(document.getElementById('sqlBox').textContent); alert('SQL 복사됨 (목업)'); }

/* init */
renderTableList();
renderAll();
</script>
